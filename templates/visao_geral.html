{% extends "base.html" %}
{% block titulo %}Visão geral{% endblock %}
{% block conteudo %}
<div class="topo">
  <div>
    <h1>Metas e atingimento</h1>
    <div class="sub" id="subSync">carregando…</div>
  </div>
  <div style="display:flex;gap:10px">
    {% if admin %}<button class="btn primario" id="btnSync">⟳ Atualizar agora</button>{% endif %}
  </div>
</div>

<div class="kpis" id="kpis"></div>

<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px">
    <h2 style="margin:0">Ranking de vendedores</h2>
    <div id="mselVend"></div>
  </div>
  <div style="overflow-x:auto">
  <table id="tblRank">
    <thead><tr>
      <th style="width:40px"></th>
      <th data-key="nome" data-tipo="str">Vendedor</th>
      <th data-key="data_contratacao" data-tipo="str">Tempo de casa</th>
      <th data-key="vendido">Vendido</th>
      <th data-key="meta">Meta</th>
      <th data-key="falta">Falta</th>
      <th data-key="pct">% Ating.</th>
      <th style="width:160px">Progresso</th>
    </tr></thead>
    <tbody id="ranking"></tbody>
  </table>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
let RANK = [];
let MSEL = null;
const SORT = {key: 'pct', dir: 'desc', tipo: 'num'};

async function carregar() {
  const j = await apiGet('/api/dashboard');
  if (!j || j.status !== 'ok') return;
  const d = j.data;
  document.getElementById('subSync').textContent =
    d.ultimo_sync ? ('Atualizado: ' + d.ultimo_sync.slice(0, 16).replace('T', ' ')) : 'nenhum sync ainda — clique em Atualizar agora';
  const vends = d.ranking.filter(r => r.vendedor_id != null);
  document.getElementById('kpis').innerHTML = `
    <div class="kpi"><div class="ico verde">🎯</div><div class="val verde">${fmt(d.kpis.meta_total)} <small>bags</small></div><div class="lbl">Meta Total</div></div>
    <div class="kpi"><div class="ico laranja">🛒</div><div class="val laranja">${fmt(d.kpis.vendido_total)} <small>bags</small></div><div class="lbl">Vendido</div></div>
    <div class="kpi"><div class="ico azul">📈</div><div class="val azul">${pct(d.kpis.pct_geral)}</div><div class="lbl">Atingimento Geral</div></div>
    <div class="kpi"><div class="ico ouro">👥</div><div class="val ouro">${vends.length}</div><div class="lbl">Vendedores</div></div>`;
  RANK = d.ranking;
  if (!MSEL) MSEL = criarMsel('mselVend', 'Vendedores',
    vends.map(r => ({val: r.vendedor_id, txt: r.nome})), render);
  render();
}

function render() {
  const sel = MSEL ? MSEL.selecionados() : new Set();
  let linhas = RANK.filter(r => sel.size === 0
    ? true : (r.vendedor_id != null && sel.has(r.vendedor_id)));
  linhas = ordenar(linhas, SORT);
  document.getElementById('ranking').innerHTML = linhas.map(r => `
    <tr id="row-${r.vendedor_id}">
      <td>${r.vendedor_id != null ? `<button class="btn-mais" onclick="toggleVendedor(${r.vendedor_id}, this)">+</button>` : ''}</td>
      <td>${r.nome}</td>
      <td style="color:var(--texto-leve)">${tempoDeCasa(r.data_contratacao) ?? '—'}</td>
      <td>${fmt(r.vendido)}</td><td>${fmt(r.meta)}</td><td>${fmt(r.falta)}</td>
      <td><span class="badge ${badgeCls(r.pct)}">${pct(r.pct)}</span></td>
      <td>${gaugeHtml(r.pct)}</td>
    </tr>`).join('');
}

async function toggleVendedor(id, btn) {
  const row = document.getElementById('row-' + id);
  const aberta = document.getElementById('det-' + id);
  if (aberta) { aberta.remove(); btn.classList.remove('aberto'); return; }
  btn.classList.add('aberto');
  const j = await apiGet('/api/vendedor/' + id);
  if (!j || j.status !== 'ok') { btn.classList.remove('aberto'); return; }
  const d = j.data;
  const det = document.createElement('tr');
  det.className = 'row-detail';
  det.id = 'det-' + id;
  const tm = d.totais.meta, tv = d.totais.vendido;
  det.innerHTML = `<td colspan="8">
    <div class="subtitulo">${d.vendedor.nome} — por cultivar
      ${d.vendedor.data_contratacao ? '· contratado em ' + d.vendedor.data_contratacao + ' (' + tempoDeCasa(d.vendedor.data_contratacao) + ')' : ''}</div>
    <table>
      <thead><tr><th>Cultivar</th><th>Vendido</th><th>Meta</th><th>Falta</th><th>%</th><th style="width:130px">Progresso</th></tr></thead>
      <tbody>${d.linhas.map(l => `
        <tr><td>${l.cultivar}</td><td>${fmt(l.vendido)}</td><td>${fmt(l.meta)}</td>
        <td class="${l.falta < 0 ? 'pos' : ''}">${l.falta < 0 ? '+' + fmt(-l.falta) : fmt(l.falta)}</td>
        <td>${pct(l.pct)}</td><td>${gaugeHtml(l.pct)}</td></tr>`).join('')}</tbody>
      <tfoot><tr><td>TOTAL</td><td>${fmt(tv)}</td><td>${fmt(tm)}</td><td>${fmt(Math.max(tm - tv, 0))}</td>
        <td>${pct(tm ? tv / tm : null)}</td><td></td></tr></tfoot>
    </table>
    <div class="subtitulo">Pedidos no snapshot (${d.pedidos.length})</div>
    <div style="max-height:260px;overflow:auto">
    <table>
      <thead><tr><th>Pedido</th><th>Data</th><th>Cliente</th><th>Cultivar</th><th>Bags</th><th>Status</th></tr></thead>
      <tbody>${d.pedidos.map(p => `
        <tr style="${p.incluido ? '' : 'opacity:.45'}">
          <td>${p.numpedido}</td><td>${p.data ?? '—'}</td><td style="text-align:left">${p.cliente}</td>
          <td style="text-align:left">${p.cultivar_norm}</td><td>${fmt2(p.bags)}</td>
          <td style="text-align:left">${p.status_raw}${p.incluido ? '' : ' (fora do funil)'}</td>
        </tr>`).join('')}</tbody>
    </table>
    </div>
  </td>`;
  row.after(det);
}

ligarOrdenacao(document.querySelector('#tblRank thead'), SORT, render);

const btn = document.getElementById('btnSync');
if (btn) btn.onclick = async () => {
  btn.disabled = true; btn.textContent = 'Sincronizando…';
  await apiPost('/api/sync');
  avisa('Sincronização iniciada — a tela atualiza sozinha ao concluir.');
  const poll = setInterval(async () => {
    const s = await apiGet('/api/sync/status');
    if (s && !s.rodando) {
      clearInterval(poll); btn.disabled = false; btn.textContent = '⟳ Atualizar agora';
      carregar(); avisa('Dados atualizados.');
    }
  }, 4000);
};

carregar();
</script>
{% endblock %}
